<!DOCTYPE html>
<html>
<head>
    <title>Skin Disease Detector</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            background: white;
        }

        .btn-custom {
            background-color: #4CAF50;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background-color: #45a049;
        }

        img {
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card" style="width: 400px;">
    <h2 class="mb-3">🧴 Skin Disease Detector</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" class="form-control mb-3" name="image" required>
        <button class="btn btn-custom w-100">Predict</button>
    </form>

    {% if result %}
        <hr>
        <h4>🧠 Disease: <span class="text-danger">{{ result }}</span></h4>
        <h5>💊 Medicine: <span class="text-success">{{ medicine }}</span></h5>
        <img src="{{ img }}" width="200">
    {% endif %}
</div>

</body>
</html>
